<!DOCTYPE html>
<html>
<head>
    <title>موقع الأستاذ رائد</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Navbar */
        .navbar {
            background: #2c3e50;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 16px;
        }

        .navbar a:hover {
            color: #00c6ff;
        }

        /* Hero */
        .hero {
            background: linear-gradient(to right, #007bff, #00c6ff);
            color: white;
            text-align: center;
            padding: 70px;
        }

        /* Sections */
        .section {
            padding: 50px;
            text-align: center;
        }

        .section:nth-child(even) {
            background: #f4f4f4;
        }

        h2 {
            color: #333;
        }

        /* Button */
        .btn {
            padding: 10px 18px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Video */
        iframe {
            width: 80%;
            height: 350px;
            margin-top: 20px;
            border-radius: 10px;
        }

        /* Footer */
        .footer {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="#home">الرئيسية</a>
    <a href="#grammar">القواعد</a>
    <a href="#reading">القراءة</a>
    <a href="#writing">الكتابة</a>
    <a href="#video">الفيديو</a>
</div>

<!-- Hero -->
<div class="hero" id="home">
    <h1>الأستاذ رائد فيصل محمد</h1>
    <p>مدرس اللغة الانكليزية</p>
</div>

<!-- Grammar -->
<div class="section" id="grammar">
    <h2>📚 القواعد (Grammar)</h2>
    <p>شرح قواعد اللغة الإنجليزية</p>
</div>

<!-- Reading -->
<div class="section" id="reading">
    <h2>📖 القراءة (Reading)</h2>
    <p>نصوص وتمارين قراءة</p>
</div>

<!-- Writing -->
<div class="section" id="writing">
    <h2>✍️ الكتابة (Writing)</h2>
    <p>تعلم كتابة الجمل والمواضيع</p>
</div>

<!-- Video -->
<div class="section" id="video">
    <h2>🎥 الفيديو التعليمي</h2>
    <button class="btn" onclick="addVideo()">➕ إضافة فيديو</button>
    <div id="videos"></div>
</div>

<!-- Footer -->
<div class="footer">
    <p>© جميع الحقوق محفوظة</p>
</div>

<script>
function addVideo() {
    var link = prompt("حط رابط يوتيوب:");

    if(link) {
        var video = document.createElement("iframe");
        video.src = link.replace("watch?v=", "embed/");
        video.allowFullscreen = true;

        document.getElementById("videos").appendChild(video);
    }
}
</script>

</body>
</html>
